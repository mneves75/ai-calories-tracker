name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  check-all:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run fail-closed quality gate
        run: bun run check-all
